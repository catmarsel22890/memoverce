<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Алексеевка — мобильная + ПК</title>
    <style>
        * {
            user-select: none;
            touch-action: manipulation;
        }
        body {
            background: #0a1f0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Courier New', monospace;
        }
        .game-container {
            background: #2d2a1a;
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        canvas {
            display: block;
            margin: 0;
            border-radius: 24px;
            box-shadow: 0 0 0 6px #b8865c;
            width: 100%;
            height: auto;
            touch-action: none;
        }
        .ui-panel {
            margin-top: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .kpk {
            background: #1e1b14;
            color: #bada55;
            padding: 10px 18px;
            border-radius: 32px;
            font-size: 14px;
            border-left: 6px solid #bada55;
            flex: 2;
            min-width: 200px;
            font-weight: bold;
        }
        .stats {
            background: #fef0cf;
            padding: 8px 20px;
            border-radius: 32px;
            font-size: 15px;
            font-weight: bold;
            display: flex;
            gap: 20px;
        }
        .quest-panel {
            background: #2e2a1a;
            color: #ffecb3;
            padding: 6px 16px;
            border-radius: 28px;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
        }
        button {
            background: #b8865c;
            border: none;
            padding: 8px 20px;
            border-radius: 48px;
            font-weight: bold;
            font-family: monospace;
            cursor: pointer;
            transition: 0.1s linear;
            font-size: 16px;
        }
        button:hover { background: #9b6a42; color: white; transform: scale(0.97);}
        .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        @media (max-width: 700px) {
            .stats { font-size: 12px; gap: 10px; }
            button { font-size: 14px; padding: 6px 12px; }
            .kpk { font-size: 11px; }
            .quest-panel { font-size: 10px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="gameCanvas" width="1100" height="720"></canvas>
    <div class="ui-panel">
        <div class="kpk" id="kpkMessage">📟 КПК ВАСИЛИЙ: Чих!</div>
        <div class="stats">
            🪙 <span id="monetki">0</span> &nbsp;|&nbsp;
            🍓 <span id="malina">0</span> &nbsp;|&nbsp;
            🐱 <span id="mem">0</span>
        </div>
        <div class="controls">
            <div class="quest-panel" id="questHint">📜 КВЕСТ: Найди деда Серёжу</div>
            <button id="saveBtn">💾 F5</button>
            <button id="memeverseBtn">🌀 ПОРТАЛ (M)</button>
        </div>
    </div>
</div>

<script>
    // ------------------------------------------------------------
    // 1. ОПРЕДЕЛЯЕМ УСТРОЙСТВО
    // ------------------------------------------------------------
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
    const touchDevice = isMobile || isTouch;

    // ------------------------------------------------------------
    // 2. ПЕРЕМЕННЫЕ
    // ------------------------------------------------------------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const kpkDiv = document.getElementById('kpkMessage');
    const monSpan = document.getElementById('monetki');
    const malSpan = document.getElementById('malina');
    const memSpan = document.getElementById('mem');
    const questHint = document.getElementById('questHint');

    let player = { x: 550, y: 550, speed: 5 };
    let cat = { x: 510, y: 550 };
    let targetX = player.x, targetY = player.y; // для сенсора
    let moveActive = false;

    let hasChip1 = false, hasChip2 = false, hasChip3 = false, hasKey = false;
    let monetki = 0, malina = 0, mem = 0;

    // NPC
    const npcs = [
        { x: 150, y: 440, name: "Баба Нина", text: "Варенье на столе!", chip: 0 },
        { x: 190, y: 440, name: "Дед Серёжа", chip: 1, dialog: "Держи первый чип!", text: "Коробка сломана!" },
        { x: 340, y: 440, name: "Лёха", chip: 2, dialog: "Нашёл чертёж!", text: "Садись на велик!" },
        { x: 510, y: 440, name: "Дед Толя", chip: 3, dialog: "Код 42!", text: "Чертёж коробки" },
        { x: 680, y: 440, name: "Сергей Вас.", chip: 4, dialog: "Квантовый ключ!", text: "ОПГ в деле!" },
        { x: 850, y: 440, name: "Тётя Зоя", shop: true, text: "Наклейка за монетку" },
        { x: 980, y: 440, name: "Кузьмич", quest: true, text: "Принеси 3 малины" },
    ];

    let items = [
        { name: "Монетка", x: 240, y: 520, found: false, icon: "🪙", val: 1 },
        { name: "Малина", x: 410, y: 520, found: false, icon: "🍓", val: 1 },
        { name: "Малина", x: 580, y: 520, found: false, icon: "🍓", val: 1 },
        { name: "Мем", x: 750, y: 520, found: false, icon: "🐱", val: 1 },
    ];

    function updateUI() { monSpan.innerText = monetki; malSpan.innerText = malina; memSpan.innerText = mem; }
    function kpkMessage(msg, time = 3000) {
        kpkDiv.innerHTML = `📟 КПК ВАСИЛИЙ: ${msg}`;
        if (time) setTimeout(() => { if (kpkDiv.innerHTML.includes(msg)) kpkDiv.innerHTML = "📟 КПК ВАСИЛИЙ: Чих!"; }, time);
    }

    function updateQuestHint() {
        if (!hasChip1) questHint.innerText = "📜 КВЕСТ: Поговори с дедом Серёжей";
        else if (!hasChip2) questHint.innerText = "📜 КВЕСТ: Найди Лёху";
        else if (!hasChip3) questHint.innerText = "📜 КВЕСТ: Найди деда Толю";
        else if (!hasKey) questHint.innerText = "📜 КВЕСТ: Поговори с Сергеем Васильевичем";
        else questHint.innerText = "✨ ПОРТАЛ ОТКРЫТ! НАЖМИ M ✨";
    }

    function talkToNPC() {
        for (let npc of npcs) {
            if (Math.hypot(player.x - npc.x, player.y - npc.y) < 40) {
                if (npc.shop && monetki >= 1) { monetki--; mem++; updateUI(); kpkMessage(`Тётя Зоя: +1 мем`); }
                else if (npc.quest && malina >= 3) { malina -= 3; mem += 5; updateUI(); kpkMessage(`Кузьмич: +5 мемов`); }
                else if (npc.chip === 1 && !hasChip1) { hasChip1 = true; mem += 10; updateUI(); kpkMessage(`${npc.name}: ${npc.dialog} +10 мемов`); updateQuestHint(); }
                else if (npc.chip === 2 && hasChip1 && !hasChip2) { hasChip2 = true; mem += 10; updateUI(); kpkMessage(`${npc.name}: ${npc.dialog} +10 мемов`); updateQuestHint(); }
                else if (npc.chip === 3 && hasChip2 && !hasChip3) { hasChip3 = true; mem += 10; updateUI(); kpkMessage(`${npc.name}: ${npc.dialog} +10 мемов`); updateQuestHint(); }
                else if (npc.chip === 4 && hasChip3 && !hasKey) { hasKey = true; mem += 10; updateUI(); kpkMessage(`${npc.name}: ${npc.dialog} +10 мемов`); updateQuestHint(); }
                else kpkMessage(`${npc.name}: ${npc.text}`);
                return;
            }
        }
    }

    // ------------------------------------------------------------
    // 3. УПРАВЛЕНИЕ (клавиши ПК + сенсор)
    // ------------------------------------------------------------
    const keys = { KeyW: false, KeyS: false, KeyA: false, KeyD: false };
    window.addEventListener('keydown', (e) => {
        if (keys.hasOwnProperty(e.code)) keys[e.code] = true;
        if (e.code === 'KeyQ') talkToNPC();
        if (e.code === 'KeyM') window.open('https://catmarsel22890.github.io/memoverce/', '_blank');
        if (e.code === 'KeyF') saveGame();
    });
    window.addEventListener('keyup', (e) => { if (keys.hasOwnProperty(e.code)) keys[e.code] = false; });

    // сенсорное управление (тап по канвасу)
    let lastTouchX = 0, lastTouchY = 0;
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const touch = e.touches[0];
        const canvasX = (touch.clientX - rect.left) * scaleX;
        const canvasY = (touch.clientY - rect.top) * scaleY;
        targetX = canvasX;
        targetY = canvasY;
        moveActive = true;
    });
    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const touch = e.touches[0];
        const canvasX = (touch.clientX - rect.left) * scaleX;
        const canvasY = (touch.clientY - rect.top) * scaleY;
        targetX = canvasX;
        targetY = canvasY;
        moveActive = true;
    });
    canvas.addEventListener('touchend', (e) => { moveActive = false; });

    function updateMovement() {
        if (!touchDevice) {
            // ПК – клавиши
            if (keys.KeyW) player.y -= player.speed;
            if (keys.KeyS) player.y += player.speed;
            if (keys.KeyA) player.x -= player.speed;
            if (keys.KeyD) player.x += player.speed;
        } else {
            // Телефон – двигаем к точке касания
            if (moveActive) {
                let dx = targetX - player.x;
                let dy = targetY - player.y;
                if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
                    let len = Math.hypot(dx, dy);
                    dx = dx / len * player.speed;
                    dy = dy / len * player.speed;
                    player.x += dx;
                    player.y += dy;
                }
            }
        }
        player.x = Math.min(Math.max(player.x, 60), canvas.width-60);
        player.y = Math.min(Math.max(player.y, 100), canvas.height-70);
    }

    // ------------------------------------------------------------
    // 4. ОТРИСОВКА
    // ------------------------------------------------------------
    function drawHouse(x, y, name, roofColor="#b5522a") {
        ctx.fillStyle = "#f9e2b0";
        ctx.fillRect(x, y, 100, 85);
        ctx.fillStyle = roofColor;
        ctx.fillRect(x-5, y-12, 110, 14);
        ctx.fillStyle = "#d49c6f";
        ctx.fillRect(x+10, y+25, 20, 25);
        ctx.fillStyle = "#ffd966";
        ctx.fillRect(x+65, y+35, 15, 20);
        ctx.fillStyle = "#3a2a1a";
        ctx.font = "bold 14px Georgia";
        ctx.fillText(name, x+15, y+82);
        ctx.strokeStyle = "#8b5a2b";
        ctx.strokeRect(x, y, 100, 85);
    }
    function draw() {
        ctx.fillStyle = "#cfe2b3";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#9b8e60";
        ctx.fillRect(0, 520, canvas.width, 42);
        drawHouse(140, 320, "Баба Нина", "#c04830");
        drawHouse(310, 320, "Лёха", "#a0a040");
        drawHouse(480, 320, "Дед Толя", "#c04830");
        drawHouse(650, 320, "Сергей Вас.", "#7a6a4a");
        drawHouse(820, 320, "Магазин", "#7a6a4a");
        drawHouse(950, 320, "Кузьмич", "#7a6a4a");
        
        for (let npc of npcs) {
            ctx.fillStyle = "#ffe0c0";
            ctx.beginPath(); ctx.arc(npc.x, npc.y, 12, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#3a2a1a";
            ctx.font = "bold 10px monospace";
            ctx.fillText(npc.name, npc.x-18, npc.y-12);
            ctx.fillStyle = "#4a2a1a";
            ctx.fillRect(npc.x-5, npc.y+2, 10, 14);
        }
        for (let it of items) if (!it.found) { ctx.font = "27px monospace"; ctx.fillText(it.icon, it.x, it.y); }
        ctx.fillStyle = "#b8a898";
        ctx.beginPath(); ctx.ellipse(cat.x, cat.y, 15, 12, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#3a6ea5";
        ctx.fillRect(player.x-8, player.y-18, 16, 24);
        ctx.fillStyle = "#ffd2a5";
        ctx.beginPath(); ctx.arc(player.x, player.y-22, 11, 0, Math.PI*2); ctx.fill();
        if (touchDevice) {
            ctx.fillStyle = "#ffcc88";
            ctx.font = "14px monospace";
            ctx.fillText("👉 Тапай по экрану, чтобы ходить", 20, 40);
        }
    }

    // ------------------------------------------------------------
    // 5. СОХРАНЕНИЕ, ОБНОВЛЕНИЕ
    // ------------------------------------------------------------
    function saveGame() { localStorage.setItem('alexeevka_save', JSON.stringify({ x: player.x, y: player.y, c1: hasChip1, c2: hasChip2, c3: hasChip3, k: hasKey, mon: monetki, mal: malina, mem: mem, items: items.map(i=>i.found) })); kpkMessage("💾 Сохранено!", 1500); }
    function loadGame() { try { let d = JSON.parse(localStorage.getItem('alexeevka_save')); if(d) { player.x = d.x; player.y = d.y; hasChip1 = d.c1; hasChip2 = d.c2; hasChip3 = d.c3; hasKey = d.k; monetki = d.mon; malina = d.mal; mem = d.mem; d.items.forEach((f,i)=>items[i].found=f); updateUI(); updateQuestHint(); kpkMessage("💾 Загрузка!"); } } catch(e){} }

    let lastTime = 0;
    function animate() {
        updateMovement();
        let dx = player.x - cat.x, dy = player.y - cat.y;
        cat.x += dx * 0.1; cat.y += dy * 0.1;
        for (let it of items) if (!it.found && Math.hypot(player.x - it.x, player.y - it.y) < 28) {
            it.found = true;
            if (it.icon === "🪙") monetki += it.val;
            else if (it.icon === "🍓") malina += it.val;
            else mem += it.val;
            updateUI(); kpkMessage(`Нашёл ${it.name}! ${it.icon}`, 1200);
        }
        draw();
        requestAnimationFrame(animate);
    }

    document.getElementById('saveBtn').onclick = saveGame;
    document.getElementById('memeverseBtn').onclick = () => window.open('https://catmarsel22890.github.io/memoverce/', '_blank');
    
    loadGame(); updateUI(); updateQuestHint(); animate();
    if (touchDevice) kpkMessage("📱 Телефон: тапай по полю, чтобы ходить. Кнопки внизу.", 4000);
</script>
</body>
</html>
